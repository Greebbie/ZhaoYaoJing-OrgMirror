# ZhaoYaoJing Default Configuration

org:
  name: ""
  size: "10-30"
  type: "startup"  # startup | corp | research | nonprofit
  departments: []
  communication_channels: []

analysis:
  language: "auto"  # zh | en | auto
  anonymous_mode: true
  max_thread_messages: 30  # Max messages to grab for @Bot thread analysis

llm:
  primary:
    provider: "openai"
    model: "gpt-4o"
  fallback:
    - provider: "qwen"
      model: "qwen-max"
    - provider: "gemini"
      model: "gemini-2.0-flash"
    - provider: "minimax"
      model: "MiniMax-Text-01"
  agent_overrides: {}

triggers:
  enabled: false
  rules: []

privacy:
  anonymous_mode: true
  local_mode: false
