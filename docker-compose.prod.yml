services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: zhaoyaojing
      POSTGRES_USER: zyj
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zyj -d zhaoyaojing"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://zyj:${POSTGRES_PASSWORD:-changeme}@db:5432/zhaoyaojing
      - CORS_ORIGINS=http://localhost,http://localhost:80,https://${DOMAIN:-localhost}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
      - web

volumes:
  pgdata:
